<section class="tech-hero">
  <div class="container">
    <p class="tech-hero__overline">НАШАТА ТЕХНОЛОГИЈА</p>
    <h1 class="tech-hero__title">Паметна Технологија на Физиотерапијата</h1>
    <span class="tech-hero__rule"></span>
    <p class="tech-hero__subtitle">
      Пет напредни клинички модалитети кои работат во синергија за мерливи, трајни резултати.
      Секој третман е прецизно водено од податоци.
    </p>
  </div>
</section>

<section class="tech-blocks">
  <div
    class="tech-block container"
    *ngFor="let block of blocks; let i = index; let odd = odd"
    [class.tech-block--reverse]="odd"
    #block
  >
    <div class="tech-block__visual">
      <div class="tech-block__icon" [ngSwitch]="block.icon">
        <svg *ngSwitchCase="'scan'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 8V5a1 1 0 011-1h3M20 8V5a1 1 0 00-1-1h-3M4 16v3a1 1 0 001 1h3M20 16v3a1 1 0 01-1 1h-3" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        <svg *ngSwitchCase="'wave'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 12c2-4 4 4 6 0s4 4 6 0 4 4 6 0" />
        </svg>
        <svg *ngSwitchCase="'pulse'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 12h4l2-7 4 14 2-7h6" />
        </svg>
        <svg *ngSwitchCase="'wind'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8h11a2.5 2.5 0 100-5M3 16h15a2.5 2.5 0 110 5M3 12h8" />
        </svg>
        <svg *ngSwitchCase="'zap'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z" />
        </svg>
      </div>
    </div>

    <div class="tech-block__content">
      <h2 class="tech-block__name">{{ block.name }}</h2>
      <p class="tech-block__desc">{{ block.description }}</p>
      <ul class="tech-block__benefits">
        <li *ngFor="let benefit of block.benefits">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 13l4 4L19 7" />
          </svg>
          {{ benefit }}
        </li>
      </ul>
      <app-button variant="primary" routerLink="/contact">Закажи го овој третман</app-button>
    </div>
  </div>
</section>
