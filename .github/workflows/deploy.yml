name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main]
  # Lets a fresh, artifact-clean run be triggered on demand. Prefer this
  # over "Re-run failed jobs" for this workflow: a re-run reuses the same
  # run ID and its old github-pages artifact isn't cleared, so re-running
  # after a failed deploy step creates a second same-named artifact and
  # deploy-pages fails with "Multiple artifacts named github-pages found".
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run build -- --base-href /physiofirst/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/physiofirst/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
